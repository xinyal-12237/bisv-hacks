<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
    body {
        overflow-x: hidden;
    }
    .sidebar {
        height: 100vh;
        background-color: #212529;
    }
    .sidebar a {
        color: white;
          text-decoration: none;
        display: block;
        padding: 15px;
        font-size: 18px
    }
    .sidebar a:hover {
        background-color: #343a40;
    }
    .sticky-sidebar {
      position: sticky; /* Makes the element "sticky" */
      top: 0; /* Sticks to the top of the viewport when it reaches this position */
      height: 100vh; /* Optional: Makes the sidebar itself always fill the viewport height if desired */
      width: 175px; /* Adjust width as needed */
      overflow-y: auto; /* Adds scrollbar to the sidebar if its content is too long */
    }
    </style>
</head>
<body>
   <div class="container-fluid">
        <div class="row">

    <!-- Sidebar -->
            <div class="col-4 sidebar p-3 sticky-sidebar">

            <h4 class="text-white mb-4">PolyVoice</h4>

                <a href="{{ url_for('home', userid=userid) }}">🏠 Home</a>
                <a href="{{ url_for('picklang', userid=userid) }}">🎤 Speech to Text</a>
                <a href="{{ url_for('translation', userid=userid) }}">🔊 Text to Speech</a>
                <a href="{{ url_for('savedtranslations', userid=userid) }}">💾 Saved Transcriptions</a>

            </div>

            <div class="col-8 p-4">
                <h2 class="m-2">Saved Translations</h2>

                <div class="row g-4">
                {% for thing in saved_translations %}
                    <div class="col-md-6 col-lg-6">
                        <div class="card shadow-sm translation-card h-100 p-3">
                            <p><strong>Word:</strong> {{ thing.wordinput }}({{ thing.langinput }})</p>
                            <p><strong>Translated:</strong> {{ thing.wordoutput }}({{ thing.langoutput }})</p>
                        </div>
                    </div>
                {% endfor %}
                </div>
            </div>
        </div>
   </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
