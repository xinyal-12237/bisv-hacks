<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .intro-card {
            background-color: white;
            padding: 2rem;
            border: 1px solid #dee2e6;
            border-radius: 0.75rem;
            box-shadow: 0 .125rem .25rem rgba(0,0,0,.075);
        }
        .button-group a {
            margin-right: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-5 text-center">

        <!-- Greeting -->
        <h2>Hi :D</h2>
        
        <!-- Intro / Advertisement Card -->
        <div class="intro-card mt-4 mb-4 mx-auto col-md-8">
            <h2 class="fw-bold">Welcome to PolySpeak!</h2>
            <p class="text-muted fs-5">
                PolySpeak is here to help you communicate efficiently. Convert your speech to text, translate across languages, and listen to your results—all with AI tools designed to make your workflow easier and more accessible.
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
            <a class="btn btn-success m-2" href="{{ url_for('login') }}" role="button">Log In</a>
            <a class="btn btn-outline-success m-2" href="{{ url_for('signup') }}" role="button">Sign Up</a>
        </div>

    </div>
</body>
</html>
